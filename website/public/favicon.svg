<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <!-- Main L Gradient -->
    <linearGradient id="icon-l-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="60%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#4f46e5" />
    </linearGradient>

    <!-- AI Core Hub Gradient -->
    <linearGradient id="icon-ai-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="50%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="icon-ai-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- MCP Connection Lines (Topology) -->
  <line x1="32" y1="45" x2="65" y2="45" stroke="#6366f1" stroke-width="2.5" stroke-dasharray="3 3" opacity="0.6" />
  <line x1="65" y1="80" x2="65" y2="45" stroke="#06b6d4" stroke-width="2.5" stroke-dasharray="3 3" opacity="0.6" />
  <line x1="65" y1="45" x2="80" y2="25" stroke="#6366f1" stroke-width="2" opacity="0.6" />
  <line x1="65" y1="45" x2="52" y2="20" stroke="#8b5cf6" stroke-width="2" opacity="0.6" />
  <line x1="65" y1="45" x2="82" y2="58" stroke="#06b6d4" stroke-width="2" opacity="0.6" />

  <!-- Pulsing Orbital Ring around the AI Core -->
  <circle cx="65" cy="45" r="14" stroke="#06b6d4" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.4" />

  <!-- Sleek L Ribbon (representing Lumina's core developer engine) -->
  <path d="M32 20V68C32 74.6274 37.3726 80 44 80H78" stroke="url(#icon-l-grad)" stroke-width="11" stroke-linecap="round" stroke-linejoin="round" />

  <!-- Outer Connection Nodes (Representing integrated APIs: DB, Git, Jira) -->
  <circle cx="32" cy="20" r="4.5" fill="#8b5cf6" stroke="#ffffff" stroke-width="1.5" />
  <circle cx="78" cy="80" r="4.5" fill="#06b6d4" stroke="#ffffff" stroke-width="1.5" />
  
  <!-- Mid-ribbon Connection Points -->
  <circle cx="32" cy="45" r="4.5" fill="#6366f1" stroke="#ffffff" stroke-width="1.5" />
  <circle cx="65" cy="80" r="4.5" fill="#38bdf8" stroke="#ffffff" stroke-width="1.5" />

  <!-- Topology Network Nodes -->
  <circle cx="80" cy="25" r="4" fill="#8b5cf6" stroke="#ffffff" stroke-width="1.2" />
  <circle cx="52" cy="20" r="3.5" fill="#a78bfa" stroke="#ffffff" stroke-width="1.2" />
  <circle cx="82" cy="58" r="3.5" fill="#06b6d4" stroke="#ffffff" stroke-width="1.2" />

  <!-- The Glowing AI Hub Core -->
  <circle cx="65" cy="45" r="8.5" fill="url(#icon-ai-grad)" filter="url(#icon-ai-glow)" />
  <circle cx="65" cy="45" r="4" fill="#ffffff" />
</svg>